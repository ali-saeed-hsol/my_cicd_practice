
name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull the code from GitHub onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies (Testing the "CI" part)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run a basic check (Linting/Syntax)
      - name: Check Syntax
        run: python -m py_compile app.py

      # Step 5: Docker Build (The "Package" part)
      - name: Build Docker Image
        run: docker build -t my-python-app:latest .

      # Step 6: Simulate Deployment (The "CD" part)
      - name: Deploy Simulation
        run: echo "Deployment successful to Production Server!"
