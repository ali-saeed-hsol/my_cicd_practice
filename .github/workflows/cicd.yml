name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Updated to v6 (2026 standard)

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated to v6 (2026 standard)
        with:
          python-version: '3.13' # Using latest 2026 stable Python

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # We force-fix the specific libraries Trivy caught in your logs
          pip install --upgrade wheel>=0.46.2 jaraco.context>=6.1.0
          pip install -r requirements.txt

      - name: Check Syntax
        run: python -m py_compile app.py

      - name: Build Docker Image
        run: docker build -t my-python-app:latest .

      - name: Run Trivy vulnerability scanner
        # v0.35.0 is the required safe version in 2026
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'my-python-app:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Deploy Simulation
        run: echo "Deployment successful to Production Server!"
