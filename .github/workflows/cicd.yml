name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6 

      - name: Set up Python
        uses: actions/setup-python@v6 
        with:
          python-version: '3.13'
          cache: 'pip' # Added: Speeds up your workflow by caching dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # This fixes the Runner environment for the "Check Syntax" step
          pip install --upgrade wheel>=0.46.2 jaraco.context>=6.1.0
          pip install -r requirements.txt

      - name: Check Syntax
        run: python -m py_compile app.py

      - name: Build Docker Image
        # Note: We build the image here. 
        # Make sure your requirements.txt also has the version upgrades!
        run: docker build -t my-python-app:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'my-python-app:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          # Added: Scans the filesystem and the image for a deep check
          vuln-type: 'os,library' 

      - name: Deploy Simulation
        # This will finally run once Trivy sees 0 HIGH/CRITICAL issues
        run: echo "Deployment successful to Production Server!"
