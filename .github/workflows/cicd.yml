name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Updated to v6 (March 2026 standard)
      - name: Checkout code
        uses: actions/checkout@v6

      # Step 2: Updated to v6.2.0 and Python 3.13 (Latest stable in 2026)
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip' # Added caching to make your logs and build faster

      # Step 3: Install dependencies & fix the "Error" you found
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # We force-upgrade the vulnerable packages Trivy identified in your logs
          pip install --upgrade jaraco.context>=6.1.0 wheel>=0.46.2
          pip install -r requirements.txt

      # Step 4: Run a basic check
      - name: Check Syntax
        run: python -m py_compile app.py

      # Step 5: Docker Build
      - name: Build Docker Image
        run: docker build -t my-python-app:latest .

      # Step 6: TRIVY SECURITY SCAN
      # UPDATED: Using v0.35.0 to avoid the March 2026 supply chain compromise.
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'my-python-app:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # Step 7: Simulate Deployment
      - name: Deploy Simulation
        run: echo "Deployment successful to Production Server!"
